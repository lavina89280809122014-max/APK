name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1
        with:
          spec: buildozer.spec
          commands: android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Phone-Camera-APK
          path: bin/*.apk
